			var i;
			var arr = [['r', this.redInput.input], ['g', this.greenInput.input], ['b', this.blueInput.input]];
			if(multiplier > 1 || multiplier < -1) {

				for(i = 0; i < arr.length; i ++) {
					//sets the raw r g b properties of this class, as well as the input.value of each of the input fields.
					this[arr[i][0]] = this[arr[i][0]] - this[arr[i][0]] * Math.abs(multiplier);
					arr[i][1].value = this[arr[i][0]];
				}
			} else {
				for(i = 0; i < arr.length; i ++) {
					this[arr[i][0]] = this[arr[i][0]] + (255 - this[arr[i][0]]) * multiplier;
					arr[i][1].value = this[arr[i][0]];

	class Canvas {
		constructor(scale, logicalWidth, logicalHeight) {
			this.scale = scale;
			this.canvas = document.createElement('canvas');
			this.ctx = this.canvas.getContext('2d');
			this.canvas.width = logicalWidth;
			this.canvas.height = logicalHeight;
			this.canvas.style.width = '' + this.scale * this.canvas.width / devicePixelRatio + 'px';
			this.canvas.style.height = '' + this.scale * this.canvas.height / devicePixelRatio + 'px';
			this.canvas.style.backgroundColor = 'rgba(0, 0, 0, 1)';
			this.canvas.style.imageRendering = 'pixelated';
			this.canvas.style.position = 'absolute';
			this.canvas.style.left = '110px';
			document.body.appendChild(this.canvas);
			this.canvas.addEventListener("contextmenu", (e) => {e.preventDefault();});  //prevent ctrl+click on canvas from triggering context menu on MacOS that interferes with copy/paste and translating functions
		}
		rescale(number) {
			var integerScalar = Math.floor(number);
			this.canvas.style.width = '' + integerScalar * this.canvas.width / devicePixelRatio + 'px';

			var original = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);

					columnsEvery = that.canvas.width;

				that.ctx.fillStyle = color;  //filled with whatever color you're currently painting with. (see App class fields).
				rowsEvery = Math.abs(Math.ceil(rowsEvery)); //establishes whole number;
				columnsEvery = Math.abs(Math.ceil(columnsEvery));
				for(var i = 1; i < width / columnsEvery; i++) {
					that.ctx.fillRect(i * (columnsEvery + 1) - 1, 0, 1, that.canvas.height);
				}
				for(i = 1; i < height / rowsEvery; i++) {
					that.ctx.fillRect(0, i * (rowsEvery + 1) - 1, that.canvas.width, 1);
				}
			}
			this.canvas.style.width = '' + this.scale * width / devicePixelRatio + 'px';
		  this.canvas.style.height = '' + this.scale * height / devicePixelRatio + 'px';

    *1: I am noticing that in mvc, model and view are similar in that both are much more like data, and controller is much more procedural. so in essence, almost all the methods and event-driven stuff belongs to the app. The controller is on top, and can access the data of the model and view, but model and view are on bottom, and can't access each other. If you were to design the way this method currently works, the host property would allow model and view to access each other.   In a bigger sense, the binding approach addresses the problem of control between different classes. Historically, you have used the host approach, which works, but creates a super object and is not best practice. MVC just approaches it a bit better. And even in a more general sense, it seems like **Control should be at the top (most abstract classes), not the bottom (least abstract classes)**.  What I think this means moving forward is that if you find yourself using the host approach in future projects, you are probably approaching it wrong. I think the bind approach also enables you to design from abstract first and worry about details later.    This differentiation of where the control resides also establishes the difference between a framework and a library. (programmer calls library methods himself, whereas frameworks call the programmer's methods for him.)
